<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Access - Gaa-tha</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f1ea 0%, #e8dcc8 100%);
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 20px;
            margin: 0;  
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: -1;
        }

        .admin-container {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 18px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.5);
            max-width: 280px;
            width: 100%;
            text-align: center;
            position: relative;
            margin-top: 20px;
            z-index: 10;
        }

        .passcode-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .input-group {
            position: relative;
        }

        .passcode-input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid rgba(184, 146, 61, 0.18);
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 500;
            text-align: center;
            letter-spacing: 3px;
            background: rgba(255, 255, 255, 0.6);
            color: #2c2c2c;
        }

        .passcode-input:focus {
            outline: none;
            border-color: #d4af37;
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1);
        }

        .passcode-input::placeholder {
            letter-spacing: 1px;
            color: #8a8a8a;
        }

        .submit-btn {
            background: linear-gradient(135deg, #7a571e 0%, #d4af37 100%);
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }


        .error-message {
            color: #e74c3c;
            font-size: 0.8rem;
            margin-top: 6px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .error-message.show {
            opacity: 1;
        }

        .loading {
            display: none;
            margin-top: 10px;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #d4af37;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .shake {
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* Mobile Responsive Styles */
        @media (max-width: 768px) {
            body {
                padding: 16px;
            }

            .admin-container {
                max-width: 100%;
                padding: 20px;
                border-radius: 14px;
            }

            .passcode-form {
                gap: 10px;
            }

            .passcode-input {
                padding: 12px 14px;
                font-size: 1rem;
                letter-spacing: 2px;
            }

            .submit-btn {
                padding: 12px 18px;
                font-size: 0.95rem;
            }
        }

        @media (max-width: 480px) {
            .admin-container {
                padding: 18px;
                border-radius: 12px;
            }

            .passcode-input {
                padding: 10px 12px;
                font-size: 0.95rem;
            }

            .submit-btn {
                padding: 10px 16px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <form class="passcode-form" id="passcodeForm">
            <div class="input-group">
                <input 
                    type="password" 
                    class="passcode-input" 
                    id="passcodeInput" 
                    placeholder="Enter Passcode"
                    maxlength="20"
                    autocomplete="off"
                    required
                >
            </div>
            
            <button type="submit" class="submit-btn" id="submitBtn">
                Access
            </button>
            
            <div class="loading" id="loading">
                <div class="spinner"></div>
            </div>
            
            <div class="error-message" id="errorMessage">
                Invalid passcode
            </div>
        </form>
    </div>

    <script>
        // Admin passcode
        const ADMIN_PASSCODE = 'Gaatha@2012';
        
        // Get form elements
        const form = document.getElementById('passcodeForm');
        const passcodeInput = document.getElementById('passcodeInput');
        const submitBtn = document.getElementById('submitBtn');
        const errorMessage = document.getElementById('errorMessage');
        const loading = document.getElementById('loading');
        
        // Focus on input when page loads
        window.addEventListener('load', () => {
            passcodeInput.focus();
        });
        
        // Handle form submission
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const enteredPasscode = passcodeInput.value.trim();
            
            // Show loading
            submitBtn.style.display = 'none';
            loading.style.display = 'block';
            errorMessage.classList.remove('show');
            
            // Simulate a brief loading delay for better UX
            setTimeout(() => {
                if (enteredPasscode === ADMIN_PASSCODE) {
                    // Clear any existing Firebase localStorage items before storing admin secret
                    try {
                        const keysToRemove = [];
                        for (let i = 0; i < localStorage.length; i++) {
                            const key = localStorage.key(i);
                            if (key && (key.startsWith('firebase:') || key.includes('gaatha-b9ee5-default-rtdb'))) {
                                keysToRemove.push(key);
                            }
                        }
                        keysToRemove.forEach(key => localStorage.removeItem(key));
                    } catch(e) {}
                    
                    // Store admin secret key in localStorage
                    localStorage.setItem('admin_secret', 'gaatha_admin_2025_secret_key_xyz789');
                    // Correct passcode - redirect to admin dashboard
                    window.location.href = '../GaathaAdmin123.html';
                } else {
                    // Wrong passcode - show error
                    showError();
                }
            }, 800);
        });
        
        function showError() {
            // Hide loading, show button
            loading.style.display = 'none';
            submitBtn.style.display = 'block';
            
            // Show error message
            errorMessage.classList.add('show');
            
            // Shake animation
            passcodeInput.classList.add('shake');
            setTimeout(() => {
                passcodeInput.classList.remove('shake');
            }, 500);
            
            // Clear input and focus
            passcodeInput.value = '';
            passcodeInput.focus();
        }
        
        // Clear error message when user starts typing
        passcodeInput.addEventListener('input', () => {
            if (errorMessage.classList.contains('show')) {
                errorMessage.classList.remove('show');
            }
        });
        
        // Handle Enter key
        passcodeInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                form.dispatchEvent(new Event('submit'));
            }
        });
        
        // Auto-focus on input when clicking anywhere
        document.addEventListener('click', () => {
            passcodeInput.focus();
        });
    </script>
</body>
</html>
