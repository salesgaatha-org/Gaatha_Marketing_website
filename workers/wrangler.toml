name = "r2-presign"
main = "r2-presign.js"
compatibility_date = "2024-01-01"

# R2 bucket binding (for direct uploads)
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "gaatha-media"

# Environment variables (secrets are set via: wrangler secret put)
