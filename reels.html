        // Upload to Cloudflare R2 via worker (avoids CORS issues)
        async function uploadReelToR2(file, folder = 'reels') {
            // Generate unique filename
            const timestamp = Date.now();
            const randomStr = Math.random().toString(36).substring(2, 15);
            const fileExt = file.name.split('.').pop() || 'mp4';
            const fileName = `${folder}/${timestamp}-${randomStr}.${fileExt}`;
            
            // Upload file directly to worker (worker uploads to R2 server-side)
            // This avoids CORS issues since worker-to-R2 is server-side
            const uploadUrl = `${R2_PRESIGN_ENDPOINT}?fileName=${encodeURIComponent(fileName)}`;
            const uploadResponse = await fetch(uploadUrl, {
                method: 'POST',
                body: file,
                headers: {
                    'Content-Type': file.type || 'video/mp4'
                }
            });

                const errorData = await uploadResponse.json().catch(() => ({}));
                throw new Error(errorData.error || 'Failed to upload to R2');

            // Ensure URL has https:// prefix (absolute URL)
            let finalUrl = publicUrl || `${R2_CUSTOM_DOMAIN}/${fileName}`;
            if (!finalUrl.startsWith('http://') && !finalUrl.startsWith('https://')) {
                finalUrl = `https://${finalUrl}`;
            }
            
            // Return public URL (ensure it's absolute)
            return finalUrl;

            const key = card && card.dataset ? card.dataset.batchKey : '';
            if (!key || !batchLoadStatus[key]) return;
            const batch = batchLoadStatus[key];
            batch.loaded = Math.min(batch.expected, batch.loaded + 1);
            if (batch.loaded >= batch.expected) {
                // Animate this batch now that all its cards are ready
                batch.cards.forEach((c) => {
                    try {
                        c.style.transition = 'opacity 500ms ease, transform 500ms ease';
                        if (!c.style.transform || c.style.transform === 'none') {
                            c.style.transform = 'translateY(0)';
                        }
                        c.style.opacity = '1';
                    } catch (_) {}
                });
            }
        }

        // Limit concurrent reel loads to reduce bandwidth
        const MAX_CONCURRENT_REEL_LOADS = isMobile ? 1 : 8;
        let currentReelLoads = 0;
        const pendingReelLoadQueue = [];

        function enqueueReelLoad(reelCard) {
            if (!reelCard || reelCard.dataset.loading === 'true' || reelCard.dataset.loaded === 'true') return;
            pendingReelLoadQueue.push(reelCard);
            processReelLoadQueue();
        }

        function processReelLoadQueue() {
            while (currentReelLoads < MAX_CONCURRENT_REEL_LOADS && pendingReelLoadQueue.length > 0) {
                const card = pendingReelLoadQueue.shift();
                if (!card || !card.isConnected || card.dataset.loaded === 'true' || card.dataset.loading === 'true') continue;
                startReelLoad(card);
            }
        }

        function startReelLoad(reelCard) {
            if (!videoLoadingTriggered) return; // wait for intro animation
            reelCard.dataset.loading = 'true';
            currentReelLoads++;
            if (isMobile) {
                loadVisibleReel(reelCard);
            } else {
                eagerLoadReelVideo(reelCard);
            }
        }

        function onReelLoaded(reelCard) {
            if (!reelCard) return;
            reelCard.dataset.loading = 'false';
            currentReelLoads = Math.max(0, currentReelLoads - 1);
            processReelLoadQueue();
        }

        // Load reels data from Firebase
        function loadReelsFromFirebase() {
            database.ref('reels').once('value')
                .then(function(snapshot) {
                    const reelsData = snapshot.val();
                    
                    if (reelsData) {
                        const reels = Object.keys(reelsData).map(key => ({
                            id: key,
                            ...reelsData[key]
                        })).sort((a, b) => (a.order || 0) - (b.order || 0));

                        // Store reels data and wait for animation to complete
                        pendingReelsData = reels;
                        
                        // If animation already completed, trigger loading immediately
                        if (videoLoadingTriggered) {
                            updateReelsUI(reels);
                        }
                    } else {
                        // Hide preloader if no data
                        hidePreloader();
                    }
                })
                .catch(function(error) {
                    // Hide preloader even on error
                    hidePreloader();
                });
        }
        
        // Trigger video loading after animation completes
        function triggerVideoLoading() {
            videoLoadingTriggered = true;
            
            if (pendingReelsData) {
                updateReelsUI(pendingReelsData);
            }
        }

        // Check if all videos are loaded
        function checkAllVideosLoaded() {
            if (totalVideos > 0 && loadedVideos >= totalVideos && !allVideosLoaded) {
                allVideosLoaded = true;
                hidePreloader();
            }
        }
        
        // Initialize visibility observer for mobile
        function initVisibilityObserver() {
            if (visibilityObserver) return;
            
            visibilityObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const reelCard = entry.target;
                    const reelId = reelCard.dataset.reelId;
                    
                    if (entry.isIntersecting) {
                        visibleReels.add(reelId);
                        currentVisibleReel = reelId;
                        // Queue loading with concurrency control
                        enqueueReelLoad(reelCard);
                    } else {
                        visibleReels.delete(reelId);
                        if (currentVisibleReel === reelId) {
                            currentVisibleReel = null;
                        }
                    }
                });
            }, {
                threshold: 0.25,
                rootMargin: '200px 0px'
            });
        }

        // Desktop-only: play/pause based on viewport visibility
        function initDesktopPlaybackObserver() {
            if (isMobile) return;
            const cards = document.querySelectorAll('.reel-card');
            if (!cards.length) return;
            const playObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const video = entry.target.querySelector('video');
                    if (!video) return;
                    const userPaused = entry.target.dataset.userPaused === 'true';
                    if (entry.isIntersecting && !userPaused) {
                        try { video.muted = true; video.play().catch(()=>{}); } catch (_) {}
                    }
                });
            }, { threshold: 0.75, rootMargin: '100px 0px' });
            cards.forEach(c => {
                const v = c.querySelector('video');
                if (v) {
                    v.addEventListener('pause', () => { c.dataset.userPaused = 'true'; });
                    v.addEventListener('play', () => { c.dataset.userPaused = 'false'; });
                }
                playObserver.observe(c);
            });
        }
        try { window.initDesktopPlaybackObserver = initDesktopPlaybackObserver; } catch (_) {}

        // Eager-load real video sources when a desktop reel card becomes visible
        function eagerLoadReelVideo(reelCard) {
            if (isMobile) return;
            if (!videoLoadingTriggered) return;
            if (reelCard.dataset.loaded === 'true') return;
            const videoEl = reelCard.querySelector('video');
            if (!videoEl) return;
            // If sources already set, skip
            const hasSrc = Array.from(videoEl.querySelectorAll('source')).some(s => s.getAttribute('src'));
            if (hasSrc) return;
            const reelData = reelCard.dataset.reelData ? JSON.parse(reelCard.dataset.reelData) : null;
            let srcUrl = reelData && reelData.video ? reelData.video : null;
            if (!srcUrl) return;
            // Ensure URL is absolute (has https://)
            if (!srcUrl.startsWith('http://') && !srcUrl.startsWith('https://')) {
                srcUrl = `https://${srcUrl}`;
            }
            const sources = videoEl.querySelectorAll('source');
            sources.forEach((s) => {
                const type = s.getAttribute('type') || 'video/mp4';
                s.setAttribute('src', srcUrl);
                s.setAttribute('type', type);
            });
            let marked = false;
            const markLoaded = () => {
                if (marked) return;
                marked = true;
                try {
                    const ph = reelCard.querySelector('.placeholder-content');
                    if (ph) { ph.style.display = 'none'; }
                } catch (_) {}
                reelCard.dataset.loaded = 'true';
                onReelLoaded(reelCard);
                onBatchCardLoaded(reelCard);
            };
            videoEl.addEventListener('canplaythrough', () => {
                // Start playback muted initially; user can unmute via controls
                try { videoEl.muted = true; videoEl.play().catch(()=>{}); } catch(_) {}
                markLoaded();
            }, { once: true });
            videoEl.addEventListener('loadeddata', () => {
                try { videoEl.muted = true; videoEl.play().catch(()=>{}); } catch(_) {}
            });
            videoEl.addEventListener('error', markLoaded, { once: true });
            setTimeout(markLoaded, 8000);
            try { videoEl.muted = true; videoEl.load(); videoEl.play().catch(()=>{}); } catch (_) {}
        }
        
        // Load visible reel on mobile
        function loadVisibleReel(reelCard) {
            if (!isMobile) return;
            
            // Wait for animation to complete before loading videos
            // Simplified: allow loading immediately
            
            // Check if this is a placeholder card that needs to be loaded
            const placeholderContent = reelCard.querySelector('.placeholder-content');
            if (placeholderContent && !reelCard.dataset.loaded) {
                
                // Get reel data from stored JSON
                const reelData = JSON.parse(reelCard.dataset.reelData);
                
                // Mark as loading
                reelCard.dataset.loaded = 'loading';
                
                // Replace placeholder with actual content
                const videoClass = reelCard.querySelector('.reel-video').classList.contains('vertical') ? 'reel-video vertical' : 'reel-video';
                let videoUrl = reelData.video || '';
                // Ensure URL is absolute (has https://)
                if (videoUrl && !videoUrl.startsWith('http://') && !videoUrl.startsWith('https://')) {
                    videoUrl = `https://${videoUrl}`;
                }
                const isVideo = videoUrl && (videoUrl.includes('.mp4') || videoUrl.includes('.mov') || videoUrl.includes('.webm'));
                
                let mediaElement = '';
                if (isVideo) {
                    // Determine MIME type based on file extension
                    let mimeType = 'video/mp4';
                    if (videoUrl.includes('.mov')) {
                        mimeType = 'video/quicktime';
                    } else if (videoUrl.includes('.webm')) {
                        mimeType = 'video/webm';
                    }
                    
                    // On mobile, allow fullscreen icon by not including "nofullscreen"
                    const controlsList = 'nodownload noremoteplayback';
                    
                    mediaElement = `
                        <video preload="auto" autoplay muted loop playsinline controls controlsList="${controlsList}" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                            <source src="${videoUrl}" type="${mimeType}">
                            <source src="${videoUrl}" type="video/mp4">
                            <img src="${reelData.fallbackImage || 'https://images.unsplash.com/photo-1611224923853-80b023f02d71?q=80&w=1200&auto=format&fit=crop'}" alt="${reelData.name}" style="display:none; width:100%; height:100%; object-fit:cover; border-radius:12px;">
                            Your browser does not support the video tag.
                        </video>
                    `;
                } else {
                    mediaElement = `<img src="${reelData.video || 'https://images.unsplash.com/photo-1611224923853-80b023f02d71?q=80&w=1200&auto=format&fit=crop'}" alt="${reelData.name}">`;
                }
                
                // Clean up particle animation before replacing content
                if (reelCard.dataset.particleInterval) {
                    clearInterval(parseInt(reelCard.dataset.particleInterval));
                    delete reelCard.dataset.particleInterval;
                }
                
                // Replace the placeholder content
                const videoContainer = reelCard.querySelector('.reel-video');
                videoContainer.innerHTML = mediaElement;
                
                
                
                // Handle video loading
                const videoElement = reelCard.querySelector('video');
                if (videoElement) {
                    let videoFullyLoaded = false;
                    
                    function checkVideoBuffered() {
                        if (videoElement.readyState >= 4 && videoElement.buffered.length > 0) {
                            const bufferedEnd = videoElement.buffered.end(videoElement.buffered.length - 1);
                            const duration = videoElement.duration;
                            const bufferedPercentage = (bufferedEnd / duration) * 100;
                            
                            if (bufferedPercentage >= 80 && !videoFullyLoaded) {
                                videoFullyLoaded = true;
                                reelCard.dataset.loaded = 'true';
                                loadedVideos++;
                                checkAllVideosLoaded();
                            }
                        }
                    }
                    
                    // Multiple events to ensure full loading
                    videoElement.addEventListener('loadeddata', checkVideoBuffered);
                    videoElement.addEventListener('progress', checkVideoBuffered);
                    videoElement.addEventListener('canplaythrough', function() {
                        if (!videoFullyLoaded) {
                            videoFullyLoaded = true;
                            reelCard.dataset.loaded = 'true';
                            loadedVideos++;
                            checkAllVideosLoaded();
                            onReelLoaded(reelCard);
                        }
                    });
                    
                    videoElement.addEventListener('error', function() {
                        if (!videoFullyLoaded) {
                            videoFullyLoaded = true;
                            reelCard.dataset.loaded = 'true';
                            loadedVideos++;
                            checkAllVideosLoaded();
                            onReelLoaded(reelCard);
                        }
                    });
                    
                    // Fallback timeout
                    setTimeout(() => {
                        if (!videoFullyLoaded) {
                            videoFullyLoaded = true;
                            reelCard.dataset.loaded = 'true';
                            loadedVideos++;
                            checkAllVideosLoaded();
                            onReelLoaded(reelCard);
                        }
                    }, 10000);
                    
                    // Common video protection
                    videoElement.addEventListener('contextmenu', function(e) {
                        e.preventDefault();
                        return false;
                    });
                    
                    videoElement.addEventListener('dragstart', function(e) {
                        e.preventDefault();
                        return false;
                    });
                    
                    videoElement.addEventListener('selectstart', function(e) {
                        e.preventDefault();
                        return false;
                    });
                    
                    // Load the video and ensure autoplay
                    try {
                        videoElement.muted = true;
                        videoElement.load();
                        videoElement.play().catch(()=>{});
                    } catch(_) {}
                } else {
                    // For images, mark as loaded immediately
                    reelCard.dataset.loaded = 'true';
                    loadedVideos++;
                    checkAllVideosLoaded();
                    onReelLoaded(reelCard);
                }
            }
        }

        function hidePreloader() {
            const preloader = document.getElementById('preloader');
            if (preloader) {
                preloader.classList.add('hidden');

                if (particleInterval) {

        // Start particle trail animation for placeholder cards
        function startPlaceholderParticleTrail(card) {
            // Keep particles only for mobile to reduce desktop CPU usage
            if (typeof window !== 'undefined' && window.innerWidth > 768) return;
            const trailContainer = card.querySelector('.placeholder-trail-container');
            const planeIcon = card.querySelector('.placeholder-plane-icon');
            
            if (!trailContainer || !planeIcon) return;
            
            const interval = setInterval(() => {
                // Check if elements still exist
                if (!trailContainer || !planeIcon || !card.parentNode) {
                    clearInterval(interval);
                    return;
                }
                
                try {
                    // Get plane position relative to the placeholder animation container
                    const rect = planeIcon.getBoundingClientRect();
                    const containerRect = trailContainer.getBoundingClientRect();
                    
                    const planeX = rect.left - containerRect.left + rect.width / 2;
                    const planeY = rect.top - containerRect.top + rect.height / 2;
                    
                    // Create 2 particles for subtle air trail
                    const particleClass = ['placeholder-particle1', 'placeholder-particle2'];

                            top: ${planeY + (Math.random() * 10 - 5)}px;

                        // Remove particle after animation
                        setTimeout(() => {
                            if (particle && particle.parentNode) {
                                particle.remove();
                            }
                        }, 800);
                    });
                } catch (error) {
                    clearInterval(interval);
                }
            }, 200);
            
            // Store interval reference for cleanup
            card.dataset.particleInterval = interval;

            }
            
            // Determine if it's a video file or image
            const isVideo = videoUrl && (videoUrl.includes('.mp4') || videoUrl.includes('.mov') || videoUrl.includes('.webm'));
            const videoClass = isVertical ? 'reel-video vertical' : 'reel-video';
            
            let mediaElement = '';
            if (isVideo) {
                // Determine MIME type based on file extension
                let mimeType = 'video/mp4';
                if (videoUrl.includes('.mov')) {
                    mimeType = 'video/quicktime';
                } else if (videoUrl.includes('.webm')) {
                    mimeType = 'video/webm';
                }
                
                // Always use preload="none"; set sources lazily on intersection (desktop) or when visible (mobile)
                mediaElement = `
                    <video preload="none" poster="${reel.fallbackImage || ''}" autoplay muted loop playsinline controls controlsList="nodownload" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">

            const videoElement = card.querySelector('video');

        function deleteReel(reelId) {
            // Custom confirmation modal
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.innerHTML = `
                <div class="modal-content">
                    <div class="modal-header">
                        <h3 class="modal-title">Delete Reel</h3>

                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            // On small screens, hide navbar and lock scroll while modal is open
            try {
                if (window.innerWidth <= 768) {
                    const navEl = document.querySelector('nav');
                    if (navEl) { navEl.dataset.prevDisplay = navEl.style.display || ''; navEl.style.display = 'none'; }
                    document.body.dataset.prevOverflow = document.body.style.overflow || '';
                    document.body.style.overflow = 'hidden';
                }
            } catch (_) {}
            const cancelBtn = document.getElementById('cancelDeleteReelBtn');
            if (cancelBtn) cancelBtn.addEventListener('click', closeModal);
            const confirmBtn = document.getElementById('confirmDeleteReelBtn');
            if (confirmBtn) {
                confirmBtn.addEventListener('click', function(){
                    // Fetch the reel first to get its video URL for R2 deletion
                    database.ref('reels/' + reelId).once('value')
                        .then(async (snap) => {
                            const reel = snap.val() || {};
                            const videoUrl = String(reel.video || '');
                            // Derive R2 object key from public URL; supports custom domain
                            let key = '';
                            try {
                                if (videoUrl) {
                                    // Strip protocol and domain
                                    const u = new URL(videoUrl.startsWith('http') ? videoUrl : ('https://' + videoUrl));
                                    key = u.pathname.replace(/^\/+/, ''); // remove leading slash
                                }
                            } catch (_) {}
                            // Attempt to delete from R2 if we have a key
                            try {
                                if (key) {
                                    const endpoint = 'https://r2-presign.moxshang.workers.dev';
                                    await fetch(`${endpoint}?fileName=${encodeURIComponent(key)}`, { method: 'DELETE', mode: 'cors' });
                                }
                            } catch (_) {}
                            // Remove from database
                            return database.ref('reels/' + reelId).remove();
                        })
                        .then(() => { loadReelsFromFirebase(); closeModal(); })
                        .catch((error) => { });
                });
            }
        }

                    cursor: pointer;
                    transition: all 0.3s ease;
                }
                
                .modal-btn-cancel:hover {
                    background: rgba(255, 255, 255, 1);
                    transform: translateY(-2px);
                }
            `;
            document.head.appendChild(style);
        }

        // Particle trail animation (disabled)
        function createParticleTrail() { /* no-op */ }

        // Initial page load animation (disabled)
        function showPageLoadAnimation() { /* no-op */ }

        // Load data when DOM is ready
        document.addEventListener('DOMContentLoaded', function() {
            // Initialize visibility observer (used for both mobile and desktop)
            initVisibilityObserver();
            
            // Trigger video loading immediately (no intro animation)
            triggerVideoLoading();
            
            loadReelsFromFirebase();
            // Also respond to hash changes (e.g., navigating within page)
            window.addEventListener('hashchange', function() {
                const target = document.querySelector(window.location.hash);
                if (!target) return;
                const navbarOffset = 120;
                const top = target.getBoundingClientRect().top + window.pageYOffset - navbarOffset;
                window.scrollTo({ top, behavior: 'smooth' });
            });
        });
    </script>
</body>
</html>
